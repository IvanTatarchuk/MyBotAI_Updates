name: Publish to PyPI

# Fires when a GitHub Release is published (Releases → Draft a new release → Publish).
# Uses PyPI "Trusted Publishing" (OIDC) — no PyPI API token/secret needed in this repo.
# One-time setup on pypi.org: project → Settings → Publishing → add a trusted
# publisher for this repo (IvanTatarchuk/MyBotAI_Updates), workflow "publish.yml",
# environment "pypi". PyPI supports registering this before the project's first
# release exists ("pending publisher").

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for PyPI trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
