# MCP Security Observatory — server registry.
#
# Each entry is a *real, public* MCP server that the observatory scans with
# `mcp-guard scan`. The `command` is the stdio launch line, written so it runs
# from the directory where the package is installed (see observatory/README.md).
#
# `install` documents how to obtain the server; it is not run automatically —
# the scan harness assumes the servers are already installed (npm/pip) so a
# scan run stays fast and reproducible. Versions are pinned in results.json at
# scan time, not here, so this file stays a stable catalogue.
#
# Adding a server: append an entry, install it, re-run `python observatory/scan.py`.
# Findings are produced by mcp-guard's public rule set — this file contains no
# hand-written verdicts.

- name: server-filesystem
  package: "@modelcontextprotocol/server-filesystem"
  ecosystem: npm
  official: true
  install: "npm i @modelcontextprotocol/server-filesystem"
  command: "node node_modules/@modelcontextprotocol/server-filesystem/dist/index.js /tmp"

- name: server-memory
  package: "@modelcontextprotocol/server-memory"
  ecosystem: npm
  official: true
  install: "npm i @modelcontextprotocol/server-memory"
  command: "node node_modules/@modelcontextprotocol/server-memory/dist/index.js"

