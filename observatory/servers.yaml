# Note: several popular servers (Slack, GitLab, Google Maps, Brave Search)
# refuse to enumerate their tool list until a real API credential is present,
# so they can't be scanned in an unattended run and are intentionally omitted
# for now. `@wonderwhy-er/desktop-commander` writes non-JSON-RPC banner output
# to stdout, which breaks a strict MCP stdio client before tools/list — a real
# interoperability bug in that server, but it also keeps it out of this run.

- name: server-puppeteer
  package: "@modelcontextprotocol/server-puppeteer"
  ecosystem: npm
  official: true
  install: "npm i @modelcontextprotocol/server-puppeteer"
  command: "node node_modules/@modelcontextprotocol/server-puppeteer/dist/index.js"

