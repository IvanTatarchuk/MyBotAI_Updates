version: '3.8'

# Enterprise AI Analytics Platform - Production-Ready Multi-Service Architecture
# Total Infrastructure Cost: $50,000-100,000/month for enterprise scale

services:
  # ===============================
  # API Gateway & Load Balancer
  # ===============================
  api-gateway:
    image: kong:3.4
    container_name: ai_platform_gateway
    ports:
      - "8000:8000"  # HTTP
      - "8443:8443"  # HTTPS
      - "8001:8001"  # Admin API
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./infrastructure/kong/kong.yml:/kong/kong.yml
    networks:
      - ai_platform_network
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===============================
  # Authentication & Authorization
  # ===============================
  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: ai_platform_auth
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://auth_user:auth_pass@postgres:5432/ai_platform_auth
      - REDIS_URL=redis://redis:6379/1
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - OAUTH2_CLIENT_ID=${OAUTH2_CLIENT_ID}
      - OAUTH2_CLIENT_SECRET=${OAUTH2_CLIENT_SECRET}
      - MFA_ENCRYPTION_KEY=${MFA_ENCRYPTION_KEY}
    depends_on:
      - postgres
      - redis
    networks:
      - ai_platform_network
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ===============================
  # ML Engine & Model Serving
  # ===============================
  ml-engine:
    build:
      context: ./services/ml_engine
      dockerfile: Dockerfile
    container_name: ai_platform_ml_engine
    ports:
      - "8002:8000"
    environment:
      - MODEL_REGISTRY_URL=postgresql://ml_user:ml_pass@postgres:5432/ai_platform_models
      - REDIS_URL=redis://redis:6379/2
      - TENSORFLOW_SERVING_URL=http://tensorflow-serving:8501
      - PYTORCH_SERVING_URL=http://pytorch-serving:8080
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./data/models:/app/models
      - ./data/datasets:/app/datasets
    depends_on:
      - postgres
      - redis
      - tensorflow-serving
      - pytorch-serving
      - mlflow
    networks:
      - ai_platform_network
    deploy:
      replicas: 5
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    runtime: nvidia  # GPU support

  # ===============================
  # Data Processing Pipeline
  # ===============================
  data-pipeline:
    build:
      context: ./services/data_pipeline
      dockerfile: Dockerfile
    container_name: ai_platform_data_pipeline
    ports:
      - "8003:8000"
    environment:
      - KAFKA_BROKERS=kafka1:9092,kafka2:9093,kafka3:9094
      - SPARK_MASTER_URL=spark://spark-master:7077
      - CLICKHOUSE_URL=http://clickhouse:8123
      - POSTGRES_URL=postgresql://data_user:data_pass@postgres:5432/ai_platform_data
      - MONGODB_URL=mongodb://mongo_user:mongo_pass@mongodb:27017/ai_platform_documents
    depends_on:
      - kafka1
      - kafka2
      - kafka3
      - spark-master
      - clickhouse
      - postgres
      - mongodb
    volumes:
      - ./data/raw:/app/data/raw
      - ./data/processed:/app/data/processed
    networks:
      - ai_platform_network
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  # ===============================
  # Analytics & Reporting Service
  # ===============================
  analytics-service:
    build:
      context: ./services/analytics
      dockerfile: Dockerfile
    container_name: ai_platform_analytics
    ports:
      - "8004:8000"
    environment:
      - CLICKHOUSE_URL=http://clickhouse:8123
      - POSTGRES_URL=postgresql://analytics_user:analytics_pass@postgres:5432/ai_platform_analytics
      - REDIS_URL=redis://redis:6379/3
      - SPARK_MASTER_URL=spark://spark-master:7077
    depends_on:
      - clickhouse
      - postgres
      - redis
      - spark-master
    networks:
      - ai_platform_network
    deploy:
      replicas: 4
      resources:
        limits:
          memory: 3G
          cpus: "1.5"

  # ===============================
  # Real-time WebSocket Service
  # ===============================
  websocket-service:
    build:
      context: ./services/websocket
      dockerfile: Dockerfile
    container_name: ai_platform_websocket
    ports:
      - "8005:8000"
    environment:
      - REDIS_URL=redis://redis:6379/4
      - KAFKA_BROKERS=kafka1:9092,kafka2:9093,kafka3:9094
    depends_on:
      - redis
      - kafka1
    networks:
      - ai_platform_network
    deploy:
      replicas: 6
      resources:
        limits:
          memory: 1G
          cpus: "0.5"

  # ===============================
  # Frontend Application
  # ===============================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_platform_frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://api-gateway:8000
      - REACT_APP_WEBSOCKET_URL=ws://websocket-service:8000
      - REACT_APP_ENV=production
    depends_on:
      - api-gateway
    networks:
      - ai_platform_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.3"

  # ===============================
  # Database Services
  # ===============================
  postgres:
    image: postgres:15-alpine
    container_name: ai_platform_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ai_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - ai_platform_network
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  mongodb:
    image: mongo:7.0
    container_name: ai_platform_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ai_platform_documents
    volumes:
      - mongodb_data:/data/db
      - ./infrastructure/mongodb/init:/docker-entrypoint-initdb.d
    networks:
      - ai_platform_network
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: "1.5"

  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: ai_platform_clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: ai_platform_analytics
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infrastructure/clickhouse/config.xml:/etc/clickhouse-server/config.xml
    networks:
      - ai_platform_network
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4.0"

  # ===============================
  # Cache & Message Queue
  # ===============================
  redis:
    image: redis:7.2-alpine
    container_name: ai_platform_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - ai_platform_network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  # Kafka Cluster for Event Streaming
  kafka1:
    image: confluentinc/cp-kafka:7.4.0
    container_name: ai_platform_kafka1
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
    depends_on:
      - zookeeper
    volumes:
      - kafka1_data:/var/lib/kafka/data
    networks:
      - ai_platform_network

  kafka2:
    image: confluentinc/cp-kafka:7.4.0
    container_name: ai_platform_kafka2
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
    depends_on:
      - zookeeper
    volumes:
      - kafka2_data:/var/lib/kafka/data
    networks:
      - ai_platform_network

  kafka3:
    image: confluentinc/cp-kafka:7.4.0
    container_name: ai_platform_kafka3
    ports:
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka3:9094
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
    depends_on:
      - zookeeper
    volumes:
      - kafka3_data:/var/lib/kafka/data
    networks:
      - ai_platform_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: ai_platform_zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - ai_platform_network

  # ===============================
  # ML Model Serving
  # ===============================
  tensorflow-serving:
    image: tensorflow/serving:2.14.0-gpu
    container_name: ai_platform_tensorflow_serving
    ports:
      - "8501:8501"
      - "8500:8500"
    environment:
      MODEL_CONFIG_FILE: /models/models.config
    volumes:
      - ./data/models/tensorflow:/models
    networks:
      - ai_platform_network
    runtime: nvidia
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: "3.0"

  pytorch-serving:
    image: pytorch/torchserve:0.8.2-gpu
    container_name: ai_platform_pytorch_serving
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./data/models/pytorch:/home/model-server/model-store
    networks:
      - ai_platform_network
    runtime: nvidia
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: "3.0"

  # ===============================
  # MLflow Model Registry
  # ===============================
  mlflow:
    build:
      context: ./infrastructure/mlflow
      dockerfile: Dockerfile
    container_name: ai_platform_mlflow
    ports:
      - "5000:5000"
    environment:
      - BACKEND_STORE_URI=postgresql://mlflow_user:mlflow_pass@postgres:5432/ai_platform_mlflow
      - DEFAULT_ARTIFACT_ROOT=s3://ai-platform-artifacts/mlflow
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    depends_on:
      - postgres
    volumes:
      - mlflow_data:/mlflow
    networks:
      - ai_platform_network

  # ===============================
  # Apache Spark Cluster
  # ===============================
  spark-master:
    image: bitnami/spark:3.5
    container_name: ai_platform_spark_master
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    volumes:
      - spark_data:/opt/bitnami/spark/data
    networks:
      - ai_platform_network

  spark-worker-1:
    image: bitnami/spark:3.5
    container_name: ai_platform_spark_worker_1
    ports:
      - "8081:8081"
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=4g
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master
    volumes:
      - spark_worker1_data:/opt/bitnami/spark/data
    networks:
      - ai_platform_network

  spark-worker-2:
    image: bitnami/spark:3.5
    container_name: ai_platform_spark_worker_2
    ports:
      - "8082:8082"
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=4g
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master
    volumes:
      - spark_worker2_data:/opt/bitnami/spark/data
    networks:
      - ai_platform_network

  # ===============================
  # Monitoring & Observability
  # ===============================
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: ai_platform_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - ai_platform_network

  grafana:
    image: grafana/grafana:10.1.0
    container_name: ai_platform_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./infrastructure/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - ai_platform_network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: ai_platform_elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
      - xpack.security.enabled=false
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - ai_platform_network
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  logstash:
    image: docker.elastic.co/logstash/logstash:8.10.0
    container_name: ai_platform_logstash
    ports:
      - "5044:5044"
      - "9600:9600"
    volumes:
      - ./infrastructure/logstash/pipeline:/usr/share/logstash/pipeline
      - ./infrastructure/logstash/config:/usr/share/logstash/config
    depends_on:
      - elasticsearch
    networks:
      - ai_platform_network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.0
    container_name: ai_platform_kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - ai_platform_network

  # ===============================
  # Security & Secrets Management
  # ===============================
  vault:
    image: vault:1.15.0
    container_name: ai_platform_vault
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=${VAULT_ROOT_TOKEN}
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - vault_data:/vault/data
    networks:
      - ai_platform_network

  # ===============================
  # Workflow Management
  # ===============================
  airflow-webserver:
    build:
      context: ./infrastructure/airflow
      dockerfile: Dockerfile
    container_name: ai_platform_airflow_webserver
    ports:
      - "8090:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql://airflow_user:airflow_pass@postgres:5432/ai_platform_airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=redis://redis:6379/5
      - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/5
    depends_on:
      - postgres
      - redis
    volumes:
      - ./workflows:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    networks:
      - ai_platform_network

  airflow-scheduler:
    build:
      context: ./infrastructure/airflow
      dockerfile: Dockerfile
    container_name: ai_platform_airflow_scheduler
    command: scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql://airflow_user:airflow_pass@postgres:5432/ai_platform_airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=redis://redis:6379/5
      - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/5
    depends_on:
      - postgres
      - redis
    volumes:
      - ./workflows:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    networks:
      - ai_platform_network

  airflow-worker:
    build:
      context: ./infrastructure/airflow
      dockerfile: Dockerfile
    container_name: ai_platform_airflow_worker
    command: celery worker
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql://airflow_user:airflow_pass@postgres:5432/ai_platform_airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=redis://redis:6379/5
      - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/5
    depends_on:
      - postgres
      - redis
    volumes:
      - ./workflows:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    networks:
      - ai_platform_network
    deploy:
      replicas: 3

# ===============================
# Networks
# ===============================
networks:
  ai_platform_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ===============================
# Persistent Volumes
# ===============================
volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
  clickhouse_data:
    driver: local
  redis_data:
    driver: local
  kafka1_data:
    driver: local
  kafka2_data:
    driver: local
  kafka3_data:
    driver: local
  zookeeper_data:
    driver: local
  mlflow_data:
    driver: local
  spark_data:
    driver: local
  spark_worker1_data:
    driver: local
  spark_worker2_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  elasticsearch_data:
    driver: local
  vault_data:
    driver: local
  airflow_logs:
    driver: local