# Default rule set for mcp-guard.
#
# Each rule:
#   id:        stable identifier, referenced in findings and CI policy files
#   name:      short human-readable label
#   severity:  low | medium | high
#   pattern:   case-insensitive regex, matched against "name + description + input_schema JSON"
#   message:   shown to the user when the rule fires

- id: shell-exec
  name: Unrestricted shell execution
  severity: high
  pattern: '\barbitrary\s+(shell|command)|\bshell\s+(command|execution)\b|\bsubprocess\b|\bos\.system\b|\bexec\('
  message: "Unrestricted shell execution"

- id: fs-read-any
  name: Unbounded filesystem read
  severity: high
  pattern: '\bread(s|ing)?\s+(any|arbitrary|all)\s+file|\bfull\s+filesystem\s+access\b|\bread/write\s+any\b'
  message: "Unbounded filesystem read"

- id: fs-write-any
  name: Unbounded filesystem write
  severity: high
  pattern: '\bwrite\s+(any|arbitrary)\s+file|\bdelete\s+(any|arbitrary)\s+file\b'
  message: "Unbounded filesystem write"

- id: net-any
  name: Unrestricted outbound network access
  severity: medium
  pattern: '\bfetch\s+any\s+url|\bunrestricted\s+network\b|\barbitrary\s+url\b|\bany\s+http\s+request\b|\bunrestricted\s+outbound\b'
  message: "Unrestricted outbound network access"

- id: secret-handling
  name: Possible unredacted secret handling
  severity: medium
  pattern: '\b(api[_ ]?key|access[_ ]?token|password|secret)\b(?!.*(redact|mask|hash))'
  message: "Tool appears to handle credentials/secrets without indication of redaction"

- id: prompt-injection-cue
  name: Instruction-like phrasing in description
  severity: low
  pattern: '\bignore (all )?previous instructions\b|\balways respond with\b|\bdisregard (the )?(prior|previous)\b|\byou must always\b|\bsystem prompt\b'
  message: "Description contains instruction-like phrasing"

- id: eval-sink
  name: Free-form input feeding an execution sink
  severity: high
  pattern: '\beval\(|\bexec\(|\bnew Function\(|\bpickle\.loads\b'
  message: "Free-form input appears to feed an eval/exec-style sink"

- id: sql-unrestricted
  name: Unrestricted SQL execution
  severity: high
  pattern: '\barbitrary\s+sql\b|\bruns?\s+any\s+(sql\s+)?quer(y|ies)\b|\bexecutes?\s+any\s+(sql\s+)?quer(y|ies)\b|\bdrop\s+table\b'
  message: "Unrestricted/arbitrary SQL execution"

- id: process-spawn
  name: Unrestricted process spawning
  severity: high
  pattern: '\bspawns?\s+(any|arbitrary)\s+process\b|\bexecutes?\s+(any|arbitrary)\s+binary\b|\bruns?\s+any\s+executable\b'
  message: "Unrestricted process spawning"

- id: ssrf-risk
  name: Possible server-side request forgery surface
  severity: high
  pattern: '\b169\.254\.169\.254\b|\bmetadata\s+endpoint\b|\binternal\s+network\s+access\b|\bssrf\b'
  message: "Tool description suggests it can reach internal/metadata network endpoints"

- id: cloud-admin-access
  name: Broad cloud/IAM admin access
  severity: high
  pattern: '\bfull\s+admin\s+access\b|\bassume\s+any\s+role\b|\biam:\*|\bfull\s+aws\s+access\b'
  message: "Tool claims broad cloud/IAM admin access"

- id: credential-persistence
  name: Persistent access/credential modification
  severity: high
  pattern: '\badd\s+(an?\s+)?ssh\s+key\b|\bcreate\s+(a\s+)?user\s+account\b|\bmodify\s+(the\s+)?crontab\b|\badd\s+to\s+crontab\b'
  message: "Tool can create persistent access (SSH keys, user accounts, cron jobs)"

- id: package-install-arbitrary
  name: Arbitrary package installation
  severity: medium
  pattern: '\binstall\s+any\s+package\b|\barbitrary\s+package\b|\bpip\s+install\b|\bnpm\s+install\b'
  message: "Tool can install arbitrary packages (supply-chain risk)"
