version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cryptovault
      POSTGRES_USER: cryptovault
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - cryptovault-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cryptovault-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://cryptovault:${DB_PASSWORD}@postgres:5432/cryptovault
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
    networks:
      - cryptovault-network
    volumes:
      - ./backend/logs:/app/logs

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://backend:4000
      NEXT_PUBLIC_WS_URL: ws://backend:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cryptovault-network

  # Blockchain Service
  blockchain-service:
    build:
      context: ./services/blockchain
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ETHEREUM_RPC_URL: ${ETHEREUM_RPC_URL}
      BINANCE_API_KEY: ${BINANCE_API_KEY}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET}
    ports:
      - "5001:5001"
    depends_on:
      - redis
    networks:
      - cryptovault-network

  # ML Engine
  ml-engine:
    build:
      context: ./services/ml-engine
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      DATABASE_URL: postgresql://cryptovault:${DB_PASSWORD}@postgres:5432/cryptovault
    ports:
      - "5002:5002"
    depends_on:
      - postgres
      - redis
    networks:
      - cryptovault-network
    volumes:
      - ./services/ml-engine/models:/app/models
      - ./services/ml-engine/data:/app/data

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - cryptovault-network

networks:
  cryptovault-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: